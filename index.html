<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>As the Droplets Fall</title>
<meta name="description" content="A quiet, rainy walk. Tilt your umbrella. Stay dry as long as you can." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="stage">
    <div id="frame">
      <canvas id="canvas"></canvas>

      <!-- ── Main Menu ─────────────────────────────────────────────────────── -->
      <div id="main-menu">
        <div id="menu-inner">
          <h1 id="menu-title">As the Droplets Fall</h1>
          <p id="menu-by">by lace</p>
          <button id="btn-play">Play</button>
          <div id="menu-socials">
            <a class="social-icon" href="https://github.com/" target="_blank" rel="noopener" title="GitHub">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.22-3.37-1.22-.46-1.19-1.11-1.51-1.11-1.51-.91-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.89 1.56 2.34 1.11 2.91.85.09-.66.35-1.11.63-1.37-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.32.1-2.75 0 0 .84-.28 2.75 1.05a9.3 9.3 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.55 1.43.2 2.49.1 2.75.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.79-4.57 5.05.36.32.68.95.68 1.92 0 1.39-.01 2.51-.01 2.85 0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2z"/></svg>
            </a>
            <a class="social-icon" href="https://instagram.com/" target="_blank" rel="noopener" title="Instagram">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.2" cy="6.8" r="1" fill="currentColor" stroke="none"/></svg>
            </a>
            <a class="social-icon" href="mailto:hello@example.com" title="Email">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.4"/><path d="M3.5 6.5l8.5 6 8.5-6"/></svg>
            </a>
          </div>
        </div>
      </div>

      <!-- ── HUD stats ──────────────────────────────────────────────────────── -->
      <div id="hud-left">
        <div id="hud-card">
          <div id="hud-stats">
            <div class="stat">
              <span class="label">Distance</span>
              <span class="value" id="hud-distance">0 m</span>
            </div>
            <div class="stat">
              <span class="label">Dryness</span>
              <span class="value" id="hud-dryness">100%</span>
            </div>
            <div class="stat">
              <span class="label">Time</span>
              <span class="value" id="hud-time">00:00</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Settings button + dropdown ────────────────────────────────────── -->
      <div id="hud-right">
        <div class="icon-btn" id="btn-menu" title="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="5" cy="12" r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/>
            <circle cx="19" cy="12" r="1.4" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="drop-panel" id="menu-panel">
          <div class="menu-row" id="menu-pause">
            <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
            <span class="menu-row-label">Pause</span>
          </div>
          <div class="menu-row" id="menu-mute">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
              <path d="M4 9v6h4l5 4V5L8 9H4z"/>
              <path d="M16.5 8.5a5 5 0 0 1 0 7" stroke-linecap="round"/>
            </svg>
            <span class="menu-row-label">Sound: on</span>
          </div>
          <div class="menu-row" id="menu-fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M8 3H4v4M16 3h4v4M8 21H4v-4M16 21h4v-4"/>
            </svg>
            <span class="menu-row-label">Fullscreen</span>
          </div>
        </div>
      </div>

      <!-- ── Keyboard hint ─────────────────────────────────────────────────── -->
      <div id="keyboard-hint">
        Tilt — <kbd>A</kbd>/<kbd>D</kbd>&nbsp;&nbsp;·&nbsp;&nbsp;Jump — <kbd>Space</kbd>
      </div>

      <!-- ── Touch controls ────────────────────────────────────────────────── -->
      <div id="touch-controls">
        <div class="touch-group">
          <div class="touch-btn" id="btn-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
          </div>
          <div class="touch-btn" id="btn-jump">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg>
          </div>
          <div class="touch-btn" id="btn-right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          </div>
        </div>
      </div>

      <!-- ── Pause overlay ─────────────────────────────────────────────────── -->
      <div id="pause-overlay">
        <div id="pause-card">
          <h2>Resting a moment</h2>
          <p>The rain keeps falling while you're away.</p>
          <button id="btn-resume">Continue walking</button>
        </div>
      </div>

      <!-- ── Game Over / Ending screen ─────────────────────────────────────── -->
      <div id="end-overlay">
        <div id="end-card">
          <p class="end-line">You finally became part of the rain.</p>
          <div class="end-stats">
            <div class="stat">
              <span class="label">Distance</span>
              <span class="value" id="end-distance">0 m</span>
            </div>
            <div class="stat">
              <span class="label">Time</span>
              <span class="value" id="end-time">00:00</span>
            </div>
          </div>
          <div class="end-actions">
            <button id="btn-restart">Begin again</button>
            <button id="btn-to-menu">Back to menu</button>
          </div>
        </div>
      </div>

    </div><!-- #frame -->
  </div><!-- #stage -->

  <script src="js/utils.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/input.js"></script>
  <script src="js/wind.js"></script>
  <script src="js/umbrella.js"></script>
  <script src="js/road.js"></script>
  <script src="js/player.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/rain.js"></script>
  <script src="js/world.js"></script>
  <script src="js/vehicles.js"></script>
  <script src="js/puddles.js"></script>
  <script src="js/ambient.js"></script>
  <script src="js/collision.js"></script>
  <script src="js/render.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
