<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Oh Shim My Umbrella — Rain Junction</title>
  <meta name="description" content="Retrieve runaway umbrellas before the wind takes them. A cozy rainy game by lace." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --off:   #e0e4ec;
      --soft:  rgba(224,228,236,.62);
      --glass: rgba(16,20,30,.56);
      --gls2:  rgba(10,14,22,.76);
      --bdr:   rgba(224,228,236,.11);
      --ch:    #12161f;
      --acc:   #6e8eab;
      --font:  'Nunito', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin:0; padding:0; width:100%; height:100%; background:var(--ch); overflow:hidden; font-family:var(--font); color:var(--off); user-select:none; }

    /* stage */
    #shimmy-stage { position:fixed; inset:0; background:var(--ch); }
    #shimmy-canvas { display:block; width:100%; height:100%; }

    /* hud */
    #shimmy-hud {
      position:absolute;
      top:max(14px,env(safe-area-inset-top));
      left:max(16px,env(safe-area-inset-left));
      right:max(16px,env(safe-area-inset-right));
      display:flex; align-items:center; justify-content:space-between;
      z-index:10; pointer-events:none;
    }
    #shimmy-back {
      display:flex; align-items:center; gap:6px;
      background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--bdr); border-radius:22px; padding:8px 16px 8px 12px;
      color:var(--off); text-decoration:none; pointer-events:auto;
      font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
      opacity:.82; transition:opacity .18s,transform .18s;
    }
    #shimmy-back:hover { opacity:1; transform:translateX(-2px); }
    #shimmy-back svg { width:13px; height:13px; }

    #shimmy-score-card {
      background:var(--glass); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--bdr); border-radius:14px; padding:9px 18px;
      display:flex; gap:20px;
    }
    .sh-stat { text-align:center; }
    .sh-lbl { display:block; font-size:8.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--soft); margin-bottom:2px; font-weight:600; }
    .sh-val { font-size:17px; font-weight:800; color:var(--off); }

    /* streak */
    #shimmy-streak {
      position:absolute;
      top:max(66px,calc(env(safe-area-inset-top)+50px));
      left:50%; transform:translateX(-50%);
      background:var(--glass); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border:1px solid var(--bdr); border-radius:20px; padding:6px 18px;
      font-size:14px; font-weight:800; color:var(--off); letter-spacing:.02em;
      z-index:10; opacity:0; pointer-events:none; white-space:nowrap;
      transition:opacity .28s;
    }

    /* gust warning */
    #shimmy-gust-warn {
      position:absolute; bottom:max(24px,env(safe-area-inset-bottom));
      left:50%; transform:translateX(-50%);
      background:var(--glass); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border:1px solid var(--bdr); border-radius:20px; padding:7px 18px;
      font-size:11.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
      color:var(--off); white-space:nowrap; z-index:10;
      opacity:0; pointer-events:none; transition:opacity .28s;
    }
    #shimmy-gust-warn.visible { opacity:1; }

    /* drag hint */
    #shimmy-drag-hint {
      position:absolute; bottom:max(58px,calc(env(safe-area-inset-bottom)+42px));
      left:50%; transform:translateX(-50%);
      background:rgba(110,142,171,.22); border:1px solid rgba(110,142,171,.28);
      border-radius:20px; padding:7px 20px;
      font-size:11.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
      color:var(--off); white-space:nowrap; z-index:10;
      opacity:0; pointer-events:none; transition:opacity .5s;
    }
    #shimmy-drag-hint.visible { opacity:.9; animation:hpulse 2.2s ease-in-out infinite; }
    @keyframes hpulse { 0%,100%{opacity:.65} 50%{opacity:1} }

    /* instructions */
    #shimmy-instructions {
      position:absolute; inset:0;
      background:rgba(6,9,15,.78); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
      display:flex; align-items:center; justify-content:center; z-index:30;
    }
    #shimmy-inst-card {
      background:var(--gls2); border:1px solid var(--bdr);
      border-radius:24px; padding:42px 46px; text-align:center; max-width:380px;
      box-shadow:0 28px 80px rgba(0,0,0,.5);
      animation:rise .6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

    #shimmy-inst-card h2 {
      font-weight:800; font-size:22px; margin:0 0 6px;
      color:var(--off); letter-spacing:-.01em; line-height:1.15;
    }
    .inst-by { font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--soft); margin:0 0 28px; }

    .inst-steps {
      display:flex; flex-direction:column; gap:9px; margin-bottom:28px; text-align:left;
    }
    .ist {
      display:flex; align-items:center; gap:12px;
      background:rgba(224,228,236,.04); border:1px solid rgba(224,228,236,.07);
      border-radius:11px; padding:10px 14px;
    }
    .ist-n {
      width:20px; height:20px; border-radius:50%;
      background:rgba(110,142,171,.25); border:1px solid rgba(110,142,171,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:10px; font-weight:800; color:var(--acc); flex-shrink:0;
    }
    .ist-t { font-size:12.5px; font-weight:600; color:var(--soft); line-height:1.45; }
    .ist-t strong { font-weight:800; color:var(--off); }

    #shimmy-start-btn {
      width:100%; background:var(--off); color:var(--ch);
      border:none; border-radius:26px; padding:13px 32px;
      font-family:var(--font); font-size:13.5px; font-weight:800; letter-spacing:.02em;
      cursor:pointer; transition:transform .14s,box-shadow .14s;
      box-shadow:0 4px 22px rgba(0,0,0,.3);
    }
    #shimmy-start-btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.36); }
    #shimmy-start-btn:active { transform:scale(.96); }

    @media(max-width:500px){
      #shimmy-inst-card { padding:28px 22px; max-width:90vw; }
      #shimmy-inst-card h2 { font-size:19px; }
      .sh-val { font-size:15px; }
      #shimmy-score-card { padding:8px 14px; gap:14px; }
    }
  </style>
</head>
<body>
<div id="shimmy-stage">
  <canvas id="shimmy-canvas"></canvas>

  <!-- HUD -->
  <div id="shimmy-hud">
    <a href="index.html" id="shimmy-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Rain Junction
    </a>
    <div id="shimmy-score-card">
      <div class="sh-stat"><span class="sh-lbl">Returned</span><span class="sh-val" id="shimmy-score">0</span></div>
      <div class="sh-stat"><span class="sh-lbl">Lost</span><span class="sh-val" id="shimmy-lost">0</span></div>
    </div>
  </div>

  <div id="shimmy-streak"></div>
  <div id="shimmy-gust-warn"></div>
  <div id="shimmy-drag-hint">drag to owner</div>

  <!-- Instructions -->
  <div id="shimmy-instructions">
    <div id="shimmy-inst-card">
      <h2>Oh Shim My Umbrella</h2>
      <p class="inst-by">by lace</p>
      <div class="inst-steps">
        <div class="ist"><span class="ist-n">1</span><span class="ist-t"><strong>Watch</strong> for gusts — they steal umbrellas</span></div>
        <div class="ist"><span class="ist-n">2</span><span class="ist-t"><strong>Grab</strong> the runaway umbrella</span></div>
        <div class="ist"><span class="ist-n">3</span><span class="ist-t"><strong>Return</strong> it before the timer runs out</span></div>
      </div>
      <button id="shimmy-start-btn">Start</button>
    </div>
  </div>
</div>
<script src="js/shimmy.js"></script>
</body>
</html>
