<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Endless Rain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="endless-rain.css">
</head>

<body>
  <div id="stage">
    <div id="frame">
      <canvas id="canvas"></canvas>

      <div id="hud">
        <div id="hud-stats">
          <div class="stat"><span class="label">Distance</span><span class="value" id="hud-distance">0 m</span></div>
          <div class="stat"><span class="label">Dryness</span><span class="value" id="hud-dryness">100%</span></div>
          <div class="stat"><span class="label">Time</span><span class="value" id="hud-time">00:00</span></div>
        </div>
        <div id="hud-top-right">
          <div class="icon-btn" id="btn-mute" title="Sound">🔈</div>
          <div class="icon-btn" id="btn-fullscreen" title="Fullscreen">⤢</div>
          <div class="icon-btn" id="btn-pause" title="Pause">❚❚</div>
        </div>
      </div>

      <div id="hud-wind-wrap"><span id="hud-wind">Vertical</span></div>

      <div id="keyboard-hint">Tilt the umbrella — <kbd>A</kbd> / <kbd>D</kbd> or <kbd>←</kbd> / <kbd>→</kbd></div>

      <div id="touch-controls">
        <div class="touch-btn" id="btn-left">◀</div>
        <div class="touch-btn" id="btn-right">▶</div>
      </div>

      <div id="pause-overlay">
        <div id="pause-card">
          <h1>Resting a moment</h1>
          <p>The rain will keep falling gently while you're away. Tilt your umbrella to stay dry when you return.</p>
          <button id="btn-resume">Continue walking</button>
        </div>
      </div>
    </div>
  </div>


  <script src="endless-rain.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const game = new Game(canvas);
    window.game = game;
    document.getElementById('btn-pause').addEventListener('click', () => game._resumeClock());
  </script>
</body>

</html>
